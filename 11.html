<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Multivariable Calculus · Applying the concepts</title>
    <!-- MathJax 3 for LaTeX rendering (kept for consistency) -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f8faff 0%, #f0f3fd 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* MAIN CONTENT WRAPPER — respects button exclusion zone (bottom 80px) */
        .presentation-content {
            flex: 1;
            min-height: calc(100vh - 80px);
            padding: 2rem 2rem 80px 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 2.5rem 3rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .line {
            font-size: 2rem;
            line-height: 1.4;
            margin-bottom: 1.8rem;
            font-weight: 500;
            color: #1a2c3e;
            letter-spacing: -0.01em;
        }

        .line:last-child {
            margin-bottom: 0;
        }

        /* LaTeX inline styling (kept for visual harmony) */
        .latex-inline {
            display: inline-block;
            vertical-align: middle;
        }

        /* --- BUTTON EXCLUSION ZONE & NAVIGATION (fixed, always visible) --- */
        .nav-controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 30px;
            pointer-events: none;
            z-index: 1000;
        }

        .nav-btn {
            width: 140px;
            height: 50px;
            border: none;
            border-radius: 8px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s ease, background 0.2s;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Previous button (red) stays left */
        .btn-prev {
            background-color: #d32f2f;
            margin-right: auto;   /* pushes next button to the right */
        }
        .btn-prev:hover {
            background-color: #b71c1c;
        }

        /* Next button (deep green) stays right */
        .btn-next {
            background-color: #2e7d32;
            margin-left: auto;    /* ensures it stays at the right edge */
        }
        .btn-next:hover {
            background-color: #1b5e20;
        }

        .nav-btn:active {
            transform: scale(0.96);
        }

        /* Responsive adjustments: maintain exclusion zone & button sizes */
        @media (max-width: 600px) {
            .nav-btn {
                width: 120px;
                height: 48px;
                font-size: 1rem;
            }
            .presentation-content {
                padding: 1.5rem 1.2rem 80px 1.2rem;
            }
            .line {
                font-size: 1.5rem;
            }
            .content-card {
                padding: 1.5rem;
            }
        }

        @media (max-height: 500px) {
            .presentation-content {
                justify-content: flex-start;
                padding-top: 1rem;
            }
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

<div class="presentation-content">
    <div class="content-card">
        <div class="line">
            Now that we've got that concept sorted,
        </div>
        <div class="line">
            let's apply it to some situations in multi-variable calculus.
        </div>
    </div>
</div>

<div class="nav-controls">
    <button id="prevButton" class="nav-btn btn-prev">← Previous</button>
    <button id="nextButton" class="nav-btn btn-next">Next →</button>
</div>

<script>
    // --------------------------------------------------------------
    //  PURE ARITHMETIC NAVIGATION (no existence checks, buttons always visible)
    //  - Extracts numeric filename (e.g., 13.html → 13)
    //  - Previous: navigates to (current - 1).html
    //  - Next: navigates to (current + 1).html
    //  - Buttons are ALWAYS shown; boundary detection is omitted on purpose.
    //  - If a target file doesn't exist, browser shows 404 (acceptable per spec).
    // --------------------------------------------------------------
    
    (function() {
        // Extract the numeric part from the current filename (e.g., "13.html" → 13)
        function getCurrentNumber() {
            const path = window.location.pathname;
            const filename = path.substring(path.lastIndexOf('/') + 1);
            const match = filename.match(/^(\d+)\.html$/);
            if (match && match[1]) {
                return parseInt(match[1], 10);
            }
            // Fallback: in case the naming is broken, default to 13 (this file is 13.html)
            // but arithmetic still works relative to 13.
            console.warn("Could not parse numeric filename, defaulting to 13.");
            return 13;
        }

        const currentNumber = getCurrentNumber();

        // Previous button: navigate to (currentNumber - 1).html
        const prevButton = document.getElementById('prevButton');
        if (prevButton) {
            prevButton.addEventListener('click', function() {
                const target = currentNumber - 1;
                window.location.href = target + '.html';
            });
        }

        // Next button: navigate to (currentNumber + 1).html
        const nextButton = document.getElementById('nextButton');
        if (nextButton) {
            nextButton.addEventListener('click', function() {
                const target = currentNumber + 1;
                window.location.href = target + '.html';
            });
        }
    })();
</script>
</body>
</html>
